services:
  db:
    image: postgres:16-alpine
    container_name: valisys_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - valisys_network

  backend:
    build:
      context: ./Valisys_Production
      dockerfile: Dockerfile
    container_name: valisys_backend
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};Timeout=30;Command Timeout=30;
      - JwtSettings__SecretKey=${JWT_SECRET}
      - Aws__BucketName=${AWS_BUCKET_NAME}
      - Aws__Region=${AWS_REGION}
      - AWS__AccessKey=${AWS_ACCESS_KEY}
      - AWS__SecretKey=${AWS_SECRET_KEY}
    ports:
      - "5019:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - valisys_network
    volumes:
      - uploads_data:/app/uploads
    entrypoint: ["/bin/sh", "-c", "sleep 10 && dotnet Valisys_Production.dll"]

  frontend:
    build:
      context: ./valisys-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5019/api
    container_name: valisys_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - valisys_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  valisys_network:
    driver: bridge
